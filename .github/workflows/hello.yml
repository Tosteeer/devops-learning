name: Check Repository Files

on:
  push:
    branches:
      - main

jobs:
  check-files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show current directory
        run: pwd

      - name: List repository files
        run: ls -la

      - name: List projects directory
        run: ls -la projects
