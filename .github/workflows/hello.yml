name: Environment Variables Pipeline

on:
  push:
    branches:
      - main

env:
  APP_ENV: dev
  APP_NAME: devops-learning

jobs:
  show-env:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show application environment
        run: |
          echo "Application name: $APP_NAME"
          echo "Environment: $APP_ENV"

      - name: Check secret exists
        run: |
          if [ -z "$DEMO_SECRET" ]; then
            echo "DEMO_SECRET is empty"
            exit 1
          fi
          echo "DEMO_SECRET is configured"
          echo "Secret value is masked: $DEMO_SECRET"
        env:
          DEMO_SECRET: ${{ secrets.DEMO_SECRET }}
