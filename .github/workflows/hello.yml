name: Docker Build Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: my-nginx-image

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Docker version
        run: docker version

      - name: Show image tag idea
        run: |
          echo "Image name: $IMAGE_NAME"
          echo "Commit SHA: $GITHUB_SHA"
          echo "Future image tag could be: $IMAGE_NAME:$GITHUB_SHA"

      - name: List Docker project files
        run: ls -la projects/my-nginx-image

      - name: Build Docker image
        run: docker build -t $IMAGE_NAME:$GITHUB_SHA ./projects/my-nginx-image
